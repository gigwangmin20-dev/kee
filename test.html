<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBO 입문 테스트 - 팀 선택하기</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .test-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .test-header h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .test-header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan) 0%, var(--neon-magenta) 100%);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .test-content {
            display: none;
        }

        .test-content.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            color: var(--neon-cyan);
            font-size: 0.9rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            background: rgba(0, 212, 255, 0.05);
            border: 2px solid var(--neon-cyan);
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            color: var(--text-primary);
        }

        .option:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--neon-magenta);
            transform: translateX(10px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(255, 0, 255, 0.2) 100%);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.4);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-magenta) 100%);
            border: none;
            color: var(--color-bg);
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.8), 0 0 20px rgba(255, 0, 255, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-prev {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
        }

        .btn-prev:hover:not(:disabled) {
            background: rgba(0, 212, 255, 0.1);
        }

        .result-container {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .result-container.active {
            display: block;
        }

        .result-box {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid var(--neon-cyan);
            padding: 50px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .result-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--neon-cyan);
        }

        .result-team {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-magenta) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .result-description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <!-- 네비게이션 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <span class="neon-text">기광민의</span>
                <span class="logo-subtitle">야구 팀 고르기</span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="portfolio.html">팅 소개</a></li>
                <li><a href="ktwiz.html">KTWIZ</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 테스트 섹션 -->
    <section class="hero" style="min-height: auto; padding: 80px 20px;">
        <div class="test-container">
            <div class="test-header">
                <h1 class="neon-text">KBO 입문 테스트</h1>
                <p>당신에게 맞는 팀을 찾아보세요!</p>
                <p style="font-size: 0.9rem; margin-top: 15px;">10개의 질문에 답해주세요.</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- 테스트 콘텐츠 -->
            <div id="testContent"></div>

            <!-- 결과 -->
            <div class="result-container" id="resultContainer">
                <div class="result-box">
                    <div class="result-title">당신의 추천 팀!</div>
                    <div class="result-team" id="resultTeam">로딩중...</div>
                    <div class="result-description" id="resultDescription"></div>
                </div>
                <button class="btn" onclick="location.href='index.html'">홈으로 돌아가기</button>
            </div>
        </div>
    </section>

    <!-- 푸터 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 NEON Studio. All rights reserved.</p>
            <div class="social-links">
                <a href="#" class="social-icon">F</a>
                <a href="#" class="social-icon">T</a>
                <a href="#" class="social-icon">I</a>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/test.js"></script>
</body>
</html>
